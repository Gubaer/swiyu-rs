[package]
name = "swiyu-issuer"
version = "0.1.0"
edition = "2024"
license = "MIT"

[dependencies]
swiyu-core = { path = "../swiyu-core" }
axum = "0.8"
chrono = { version = "0.4", features = ["serde"] }
jsonschema = "0.30"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sqlx = { version = "0.8", default-features = false, features = ["runtime-tokio", "tls-rustls", "postgres", "macros", "migrate", "chrono", "json"] }
thiserror = "2"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal", "net"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["trace"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
