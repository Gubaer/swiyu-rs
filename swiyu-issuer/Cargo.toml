[package]
name = "swiyu-issuer"
version = "0.1.0"
edition = "2024"
license = "MIT"

[dependencies]
swiyu-core = { path = "../swiyu-core" }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
