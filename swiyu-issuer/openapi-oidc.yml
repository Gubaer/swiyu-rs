openapi: 3.1.0

info:
  title: swiyu-issuer OIDC API (wallet-facing)
  version: 0.1.3
  description: |
    Wallet-facing OID4VCI endpoints served by the `issuer-oidc`
    binary. Audience is the holder's wallet, not a business
    application — these endpoints are public (no `Authorization`
    header) and follow OAuth / OID4VCI conventions on the wire.

    All endpoints live under the issuer-scoped prefix
    `/i/{issuer_id}/…`. The bare base58 issuer id keeps deeplinked
    URLs short enough to render as QR codes; the management API
    uses the same prefix convention. The two binaries (mgmt + oidc)
    sit behind the same reverse proxy and share `ISSUER_BASE_URL`;
    see `specs/impl_api_oidc.md` (Deployment topology).

    Error bodies on the metadata and offer-uri endpoints use the
    `{ error, details }` shape inherited from the management API.
    The token and credential endpoints (not yet shipped) will emit
    OAuth's `{ error, error_description }` shape per OID4VCI; this
    document is updated alongside those slices.

    See `specs/impl_api_oidc.md` for the full design.
  license:
    name: MIT

servers:
  - url: http://localhost:8081
    description: Local development (cargo run --bin issuer-oidc)

paths:
  /healthz:
    get:
      summary: Liveness probe
      description: Always returns 200. No database check; for orchestrator liveness only.
      operationId: oidcHealthz
      responses:
        '200':
          description: Service is alive.
          content:
            text/plain:
              schema:
                type: string
                example: ok

  /readyz:
    get:
      summary: Readiness probe
      description: Returns 200 if a database connection can be acquired.
      operationId: oidcReadyz
      responses:
        '200':
          description: Service is ready to accept requests.
          content:
            text/plain:
              schema:
                type: string
                example: ok
        '503':
          description: Database is not reachable.

  /i/{issuer_id}/.well-known/openid-credential-issuer:
    get:
      summary: OID4VCI Credential Issuer Metadata
      description: |
        Issuer metadata document the wallet uses to discover the
        credential endpoint, supported credential configurations,
        signing algorithms, and display metadata. Public endpoint;
        no authentication.
      operationId: getCredentialIssuerMetadata
      parameters:
        - $ref: '#/components/parameters/IssuerId'
      responses:
        '200':
          description: Metadata returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialIssuerMetadata'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /i/{issuer_id}/.well-known/oauth-authorization-server:
    get:
      summary: OAuth Authorization Server Metadata
      description: |
        RFC 8414 metadata extended for OID4VCI's pre-authorised-code
        grant. The credential issuer is also the authorization
        server — this binary supports no other mode.
      operationId: getOauthAuthorizationServerMetadata
      parameters:
        - $ref: '#/components/parameters/IssuerId'
      responses:
        '200':
          description: Metadata returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OauthAuthorizationServerMetadata'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /i/{issuer_id}/token:
    post:
      summary: Exchange a pre-authorised code for an access token
      description: |
        OAuth token endpoint, restricted to OID4VCI's pre-authorised
        code grant. Returns an opaque access token (used at
        `/credential`) and a `c_nonce` (bound into the wallet's
        proof JWT). Both are returned exactly once; only their
        hashes are persisted.

        Errors follow the OAuth shape `{ error, error_description }`
        rather than the management API's `{ error, details }`.

        Notable error mappings:

        - 400 `unsupported_grant_type` if `grant_type` is anything
          other than `urn:ietf:params:oauth:grant-type:pre-authorized_code`.
        - 400 `invalid_grant` if the pre-auth code does not match a
          pending unexpired offer for this issuer, **or** if the
          code has already been redeemed (the unique constraint on
          `oidc_access_tokens.offer_id` rejects the second insert).
        - 400 `invalid_request` for malformed bodies / bad
          path parameters.

        The token endpoint does **not** transition the offer to
        `issued`; that happens at the credential endpoint.
      operationId: postToken
      parameters:
        - $ref: '#/components/parameters/IssuerId'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRequest'
      responses:
        '200':
          description: Token issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Invalid request, grant type, or grant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthErrorBody'
        '500':
          description: Server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthErrorBody'

  /i/{issuer_id}/credential:
    post:
      summary: Issue a credential for the offer the access token represents
      description: |
        Exchanges an access token plus a wallet `proof` for a signed
        SD-JWT VC. Authentication is by the bearer access token
        minted at `/token`.

        Wallet flow:

        1. Bearer access token is hashed and looked up. Missing,
           expired, or already-consumed → `invalid_token`.
        2. The offer the access token was minted for is loaded; it
           must still be `pending` and unexpired.
        3. The request `format` must be `vc+sd-jwt` and `vct` must
           match the offer.
        4. The wallet proof JWT is parsed; `aud`/`iat`/`nonce` are
           validated and the embedded `jwk` is bound into the
           credential as `cnf`.
        5. The `c_nonce` is consumed atomically; `mark_issued` and
           the access-token deletion run in one transaction.

        The signed credential is a degenerate SD-JWT VC at v0.1.x
        — every claim is in the JWS payload plaintext, no
        disclosures, just a trailing `~`. Selective disclosure
        lands in a follow-up slice.

        The JWS is signed with the issuer's `Assertion` key (P-256
        / ES256) through the configured `SigningEngine`. The JWS
        `kid` is `{did}#assertion-key-01`, which the issuer's
        published DID document advertises as its `assertionMethod`
        verification method, so credentials verify across restarts
        and across deployments. Issuers that lack an Assertion key
        (the seeded dev fixture row, or any issuer not yet
        onboarded through the management API) cannot issue
        credentials and return `invalid_request`.
      operationId: postCredential
      parameters:
        - $ref: '#/components/parameters/IssuerId'
      security:
        - WalletAccessToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CredentialRequest'
      responses:
        '200':
          description: Credential issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialResponse'
        '400':
          description: |
            Body is malformed, format/vct mismatch, the wallet
            proof failed to parse / didn't bind to a live nonce, or
            the issuer has no Assertion key configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthErrorBody'
        '401':
          description: Bearer access token missing, expired, or already consumed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthErrorBody'
        '500':
          description: Server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthErrorBody'

  /i/{issuer_id}/credential-offer/{offer_id}:
    get:
      summary: Fetch the OID4VCI CredentialOffer body
      description: |
        Returns the `CredentialOffer` body the wallet expects behind
        the `credential_offer_uri` from the deeplink. The body
        carries the **bare** pre-authorised code — a single-use
        bearer secret. HTTPS-only in any non-development deployment.

        Observed-state rules:

        - 200 if the offer is `pending` and not past `expires_at`.
        - 404 if the offer is unknown, `cancelled`, or `issued`.
        - 410 if the stored state is `pending` but `expires_at` has
          passed.

        See `specs/impl_api_oidc.md` for the bridge mechanism that
        carries the bare code from the management API to this
        endpoint without violating the "store hashed only" rule for
        long-lived secrets.
      operationId: getCredentialOffer
      parameters:
        - $ref: '#/components/parameters/IssuerId'
        - $ref: '#/components/parameters/OfferId'
      responses:
        '200':
          description: Pending unexpired offer.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialOffer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '410':
          $ref: '#/components/responses/Gone'

components:
  parameters:
    IssuerId:
      name: issuer_id
      in: path
      required: true
      description: Bare base58 issuer identifier (no `issuer_` prefix).
      schema:
        type: string
        pattern: '^[1-9A-HJ-NP-Za-km-z]{1,32}$'
        example: 9hXq2vRtL8pK7f

    OfferId:
      name: offer_id
      in: path
      required: true
      description: Bare base58 credential offer identifier (no `offer_` prefix).
      schema:
        type: string
        pattern: '^[1-9A-HJ-NP-Za-km-z]{1,32}$'
        example: 9hXq2vRtL8pK7f

  responses:
    BadRequest:
      description: Invalid input. Possible `error` codes include `invalid_input`.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'

    NotFound:
      description: |
        Resource not found. Used for unknown issuers, unknown offers,
        and offers in a non-redeemable terminal state. The single
        404 covers all of these so a wallet cannot probe for issuer
        or offer existence.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'

    Gone:
      description: |
        The offer existed but its `expires_at` has passed. Distinct
        from 404 so the wallet can present a clearer error to the
        holder ("offer expired" vs "offer not found").
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'

  schemas:
    CredentialIssuerMetadata:
      type: object
      required:
        - credential_issuer
        - credential_endpoint
        - authorization_servers
        - credential_configurations_supported
      properties:
        credential_issuer:
          type: string
          format: uri
          example: https://issuer.example.com/i/9hXq2vRtL8pK7f
        credential_endpoint:
          type: string
          format: uri
          example: https://issuer.example.com/i/9hXq2vRtL8pK7f/credential
        authorization_servers:
          type: array
          items:
            type: string
            format: uri
          description: |
            URLs of the authorization servers the issuer trusts for
            this credential. Currently a single-element array
            containing the issuer URL itself — the credential
            issuer is also the authorization server.
        credential_configurations_supported:
          type: object
          additionalProperties: true
          description: |
            Object keyed by credential configuration id. Each entry
            carries the format, vct, supported binding methods,
            signing algorithms, and proof types.
          example:
            urn:communal:local-residence-id:
              format: vc+sd-jwt
              vct: urn:communal:local-residence-id
              cryptographic_binding_methods_supported: [jwk]
              credential_signing_alg_values_supported: [ES256]
              proof_types_supported:
                jwt:
                  proof_signing_alg_values_supported: [ES256]
        display:
          type: array
          description: |
            Optional locale-keyed display metadata. Omitted entirely
            if the issuer row has no `display_name`.
          items:
            $ref: '#/components/schemas/DisplayEntry'

    DisplayEntry:
      type: object
      required: [name]
      properties:
        name:
          type: string
        locale:
          type: [string, "null"]
        logo:
          oneOf:
            - $ref: '#/components/schemas/DisplayLogo'
            - type: 'null'

    DisplayLogo:
      type: object
      required: [uri]
      properties:
        uri:
          type: string
          format: uri

    OauthAuthorizationServerMetadata:
      type: object
      required:
        - issuer
        - token_endpoint
        - grant_types_supported
        - token_endpoint_auth_methods_supported
        - pre-authorized_grant_anonymous_access_supported
      properties:
        issuer:
          type: string
          format: uri
          example: https://issuer.example.com/i/9hXq2vRtL8pK7f
        token_endpoint:
          type: string
          format: uri
          example: https://issuer.example.com/i/9hXq2vRtL8pK7f/token
        grant_types_supported:
          type: array
          items:
            type: string
          example: [urn:ietf:params:oauth:grant-type:pre-authorized_code]
        token_endpoint_auth_methods_supported:
          type: array
          items:
            type: string
          description: |
            `none` because the pre-authorised code itself authenticates
            the wallet at the token endpoint; no client credentials.
          example: [none]
        pre-authorized_grant_anonymous_access_supported:
          type: boolean
          description: |
            OID4VCI extension to RFC 8414. The hyphenated field name
            is per the OID4VCI registration of this metadata field
            and must not be normalised to snake_case.
          example: true

    CredentialOffer:
      type: object
      required: [credential_issuer, credential_configuration_ids, grants]
      properties:
        credential_issuer:
          type: string
          format: uri
          example: https://issuer.example.com/i/9hXq2vRtL8pK7f
        credential_configuration_ids:
          type: array
          items:
            type: string
          example: [urn:communal:local-residence-id]
        grants:
          type: object
          description: |
            Object keyed by OAuth grant-type URI. Currently a single
            entry for `urn:ietf:params:oauth:grant-type:pre-authorized_code`
            whose value carries the bare `pre-authorized_code` (a
            single-use bearer secret).
          additionalProperties: true
          example:
            urn:ietf:params:oauth:grant-type:pre-authorized_code:
              pre-authorized_code: 4Mk7yK5pQR7sN3DevDevDevDevDevDe

    ErrorBody:
      type: object
      required: [error, details]
      properties:
        error:
          type: string
          description: Stable machine-readable error code.
          enum:
            - not_found
            - expired
            - invalid_input
            - internal_error
        details:
          type: string
          description: Human-readable explanation.

    TokenRequest:
      type: object
      required: [grant_type, pre-authorized_code]
      properties:
        grant_type:
          type: string
          enum:
            - urn:ietf:params:oauth:grant-type:pre-authorized_code
        pre-authorized_code:
          type: string
          description: |
            The bare single-use bearer secret minted by the
            management API at offer creation. The hyphen is
            mandated by OID4VCI and must not be normalised to
            snake_case.

    TokenResponse:
      type: object
      required:
        - access_token
        - token_type
        - expires_in
        - c_nonce
        - c_nonce_expires_in
      properties:
        access_token:
          type: string
          description: |
            Opaque bearer token. Presented as
            `Authorization: Bearer <access_token>` at `/credential`.
            Returned exactly once; only its hash is persisted.
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
          description: Lifetime of `access_token` in seconds.
          example: 300
        c_nonce:
          type: string
          description: |
            Opaque nonce the wallet binds into its proof JWT at
            `/credential`. Returned exactly once; only its hash is
            persisted.
        c_nonce_expires_in:
          type: integer
          description: Lifetime of `c_nonce` in seconds.
          example: 300

    CredentialRequest:
      type: object
      required: [format, vct, proof]
      properties:
        format:
          type: string
          enum: [vc+sd-jwt]
        vct:
          type: string
          description: |
            SD-JWT VC type identifier; must equal the `vct` recorded
            on the offer.
          example: urn:communal:local-residence-id
        proof:
          $ref: '#/components/schemas/WalletProof'

    WalletProof:
      type: object
      required: [proof_type, jwt]
      properties:
        proof_type:
          type: string
          enum: [jwt]
        jwt:
          type: string
          description: |
            Wallet-signed JWT. Header carries the wallet's public
            key as a `jwk`; payload carries `aud` (the issuer URL),
            `iat`, and a `nonce` previously minted at `/token`.
            The signature is currently parsed but not verified at
            v0.1.x; verification is a follow-up slice.

    CredentialResponse:
      type: object
      required: [credential]
      properties:
        credential:
          type: string
          description: |
            Signed SD-JWT VC: `<header>.<payload>.<signature>~`.
            v0.1.x emits a degenerate SD-JWT — every claim is in the
            JWS payload plaintext with no disclosures.

    OAuthErrorBody:
      type: object
      required: [error, error_description]
      properties:
        error:
          type: string
          description: |
            OAuth / OID4VCI error code. See RFC 6749 §5.2 plus the
            OID4VCI extensions.
          enum:
            - invalid_grant
            - invalid_request
            - unsupported_grant_type
            - invalid_token
            - invalid_proof
            - invalid_credential_request
            - unsupported_credential_format
            - server_error
        error_description:
          type: string
          description: Human-readable explanation.

  securitySchemes:
    WalletAccessToken:
      type: http
      scheme: bearer
      description: |
        OAuth bearer access token minted at `/token`. Used only by
        the credential endpoint; the wallet path does not use it
        for metadata or offer-uri requests.
