# swiyu-issuer explorer stack — pulls published images from GHCR.
#
# Goal: no clone, no cargo, no build — just `docker compose up -d`.
#
# GENERATED FILE. Do not edit by hand. The source of truth is
# swiyu-issuer/docker-compose.yml; regenerate with
#   python3 swiyu-issuer/deploy/explorer/gen-compose.py
# CI runs `gen-compose.py --check` to block drift.
#
# IMAGE_TAG defaults to the floating `swiyu-beta`. Pin to a release by
# setting e.g. IMAGE_TAG=0.1.12-swiyu-beta in .env.
name: swiyu-issuer

services:
  postgres:
    image: postgres:17
    container_name: swiyu-issuer-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-swiyu_issuer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-swiyu_issuer}
      POSTGRES_DB: ${POSTGRES_DB:-swiyu_issuer}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-swiyu_issuer} -d ${POSTGRES_DB:-swiyu_issuer}
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  vault:
    image: hashicorp/vault:1.18
    container_name: swiyu-issuer-vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID:-dev-only-root}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
    ports:
      - "8200:8200"
    healthcheck:
      test:
        - CMD
        - vault
        - status
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  vault-init:
    image: hashicorp/vault:1.18
    container_name: swiyu-issuer-vault-init
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN_ID:-dev-only-root}
    entrypoint:
      - /bin/sh
      - -c
      - vault secrets enable transit || true
    restart: "no"

  # One-shot dev seed: brings up the contributor's dev tenant from
  # `.env`. `swiyu-issuer-cli tenant bootstrap-dev-from-env` finds the
  # tenant row by DEV_TENANT_PARTNER_ID (creating it if missing) and
  # writes the oauth_* columns from DEV_TENANT_CLIENT_ID,
  # DEV_TENANT_CLIENT_SECRET, and DEV_TENANT_REFRESH_TOKEN. The default
  # invocation is only-if-empty on the oauth columns and leaves
  # display_name/description alone, so a runtime-rotated refresh token
  # survives a re-run.
  #
  # Two CLI invocations are needed when SECRET_ENCRYPTION_ENGINE=vault:
  # the per-tenant Transit key has to exist before the CLI encrypts
  # any oauth secret, but the tenant id is only known once the row is
  # created. The first call suppresses the oauth env vars so the row
  # is created without a secret write; the second call (after the
  # Vault key provisioning loop) writes the oauth columns. For
  # SECRET_ENCRYPTION_ENGINE=dev the second call is the only one that
  # writes oauth values; the first is a cheap no-op on the row.
  #
  # API-token minting is left to the contributor:
  # `swiyu-issuer-cli tenant api-token mint --tenant <id> --name <name>`.
  # swiyu-issuer-mgmtapi's start is gated on
  # service_completed_successfully so the seed lands before any
  # OAuth2 grant is attempted.
  bootstrap-dev-tenant:
    image: ghcr.io/gubaer/swiyu-issuer-cli:${IMAGE_TAG:-swiyu-beta}
    container_name: swiyu-issuer-bootstrap-dev-tenant
    depends_on:
      postgres:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-swiyu_issuer}:${POSTGRES_PASSWORD:-swiyu_issuer}@postgres:5432/${POSTGRES_DB:-swiyu_issuer}
      DEV_TENANT_PARTNER_ID: ${DEV_TENANT_PARTNER_ID:-}
      DEV_TENANT_DISPLAY_NAME: ${DEV_TENANT_DISPLAY_NAME:-}
      DEV_TENANT_DESCRIPTION: ${DEV_TENANT_DESCRIPTION:-}
      DEV_TENANT_CLIENT_ID: ${DEV_TENANT_CLIENT_ID:-}
      DEV_TENANT_CLIENT_SECRET: ${DEV_TENANT_CLIENT_SECRET:-}
      DEV_TENANT_REFRESH_TOKEN: ${DEV_TENANT_REFRESH_TOKEN:-}
      # Must match the values handed to swiyu-issuer-mgmtapi /
      # swiyu-issuer-oidcapi: the secrets the CLI writes here are
      # decrypted by those services at runtime under the same engine.
      SECRET_ENCRYPTION_ENGINE: ${SECRET_ENCRYPTION_ENGINE:-dev}
      SECRET_ENCRYPTION_DEV_MASTER_KEY: ${SECRET_ENCRYPTION_DEV_MASTER_KEY:-ZGV2LXNlY3JldC1tYW5hZ2VtZW50LW1hc3Rlci1rZXk=}
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN_ID:-dev-only-root}
      RUST_LOG: ${RUST_LOG:-info,swiyu_issuer=debug}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        # Phase 1: ensure the row exists; capture the runtime tenant id
        # on stdout. Oauth env vars are unset for this call so a
        # vault-engine secret write cannot fire before the Transit key
        # is provisioned below. (POSIX `set -e` doesn't trigger on a
        # failure inside command substitution, hence the explicit
        # empty-string check.)
        TENANT_ID=$$(
          env -u DEV_TENANT_CLIENT_ID -u DEV_TENANT_CLIENT_SECRET -u DEV_TENANT_REFRESH_TOKEN \
            swiyu-issuer-cli tenant bootstrap-dev-from-env
        )
        if [ -z "$$TENANT_ID" ]; then
          echo "bootstrap-dev-tenant: phase 1 produced no tenant id" >&2
          exit 1
        fi
        echo "bootstrap-dev-tenant: dev tenant id = $$TENANT_ID" >&2

        if [ "$$SECRET_ENCRYPTION_ENGINE" = "vault" ]; then
          # Operator-provisioning step for the dev stack: the runtime
          # never calls `vault write -f {transit}/keys/*`. Idempotent;
          # vault returns success if the key already exists.
          for family in oauth2_client_secret oauth2_refresh_token; do
            curl -fsS -X POST \
              -H "X-Vault-Token: $$VAULT_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"type":"aes256-gcm96"}' \
              "$$VAULT_ADDR/v1/transit/keys/tenant-$$TENANT_ID-$$family" >/dev/null \
              || { echo "bootstrap-dev-tenant: failed to provision Vault key tenant-$$TENANT_ID-$$family" >&2; exit 1; }
          done
        fi

        # Phase 2: write the oauth columns (only-if-empty by default).
        # Stdout re-prints the tenant id; redirect it to /dev/null.
        swiyu-issuer-cli tenant bootstrap-dev-from-env >/dev/null
    restart: "no"

  # Phase B of dev provisioning: ensure the dev tenant has an Active
  # issuer. `swiyu-issuer-cli tenant ensure-dev-issuer-from-env` looks
  # up the tenant by DEV_TENANT_PARTNER_ID, enqueues the same
  # CreateIssuer operation_task `POST /api/v1/issuers` would, and
  # polls until the mgmtapi worker drives the saga to completion;
  # then re-runs the credential-type seed so the assignment row
  # lands. Bounded by DEV_BOOTSTRAP_TIMEOUT_SECS (default 300s).
  #
  # Runs after the mgmtapi healthcheck passes (the worker has to be
  # up to consume the task) and after bootstrap-dev-tenant has
  # finished (the dev tenant + OAuth credentials have to exist
  # before the saga calls the registry).
  bootstrap-dev-issuer:
    image: ghcr.io/gubaer/swiyu-issuer-cli:${IMAGE_TAG:-swiyu-beta}
    container_name: swiyu-issuer-bootstrap-dev-issuer
    depends_on:
      postgres:
        condition: service_healthy
      bootstrap-dev-tenant:
        condition: service_completed_successfully
      swiyu-issuer-mgmtapi:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-swiyu_issuer}:${POSTGRES_PASSWORD:-swiyu_issuer}@postgres:5432/${POSTGRES_DB:-swiyu_issuer}
      DEV_TENANT_PARTNER_ID: ${DEV_TENANT_PARTNER_ID:-}
      DEV_BOOTSTRAP_TIMEOUT_SECS: ${DEV_BOOTSTRAP_TIMEOUT_SECS:-300}
      RUST_LOG: ${RUST_LOG:-info,swiyu_issuer=debug}
    command:
      - tenant
      - ensure-dev-issuer-from-env
    restart: "no"

  # The swiyu-issuer-mgmtapi management API. SWIYU_IDENTIFIER_REGISTRY_URL,
  # SWIYU_STATUS_REGISTRY_URL, and SWIYU_TOKEN_URL come from .env; the
  # in-container hostnames for Postgres and Vault are forced here
  # because the host-side values in .env (localhost:5433,
  # localhost:8200) do not resolve inside the compose network.
  swiyu-issuer-mgmtapi:
    image: ghcr.io/gubaer/swiyu-issuer-mgmtapi:${IMAGE_TAG:-swiyu-beta}
    container_name: swiyu-issuer-mgmtapi
    depends_on:
      postgres:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-swiyu_issuer}:${POSTGRES_PASSWORD:-swiyu_issuer}@postgres:5432/${POSTGRES_DB:-swiyu_issuer}
      BIND_ADDR: 0.0.0.0:8080
      ISSUER_BASE_URL: ${ISSUER_BASE_URL:-http://localhost:8080}
      SIGNING_ENGINE: ${SIGNING_ENGINE:-vault}
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN_ID:-dev-only-root}
      # `dev` selects the in-process AES-256-GCM backend; `vault` selects
      # the Vault Transit backend (requires per-tenant Transit keys to be
      # provisioned out of band before any encrypt/decrypt call). The
      # well-known master key below encodes the 32-byte ASCII string
      # `dev-secret-management-master-key` and must never escape dev.
      SECRET_ENCRYPTION_ENGINE: ${SECRET_ENCRYPTION_ENGINE:-dev}
      SECRET_ENCRYPTION_DEV_MASTER_KEY: ${SECRET_ENCRYPTION_DEV_MASTER_KEY:-ZGV2LXNlY3JldC1tYW5hZ2VtZW50LW1hc3Rlci1rZXk=}
      SWIYU_IDENTIFIER_REGISTRY_URL: ${SWIYU_IDENTIFIER_REGISTRY_URL:-https://identifier-reg-api.trust-infra.swiyu-int.admin.ch}
      SWIYU_STATUS_REGISTRY_URL: ${SWIYU_STATUS_REGISTRY_URL:-https://status-reg-api.trust-infra.swiyu-int.admin.ch}
      SWIYU_TOKEN_URL: ${SWIYU_TOKEN_URL:-https://keymanager-prd.api.admin.ch/keycloak/realms/APIGW/protocol/openid-connect/token}
      # Smoke-test friendly default: debug for our crates, info for
      # known-noisy deps (sqlx prints every prepared statement at debug;
      # hyper/h2/reqwest/tower flood with per-byte trace lines).
      # Override via `.env` if you want something different.
      RUST_LOG: ${RUST_LOG:-debug,sqlx=info,hyper=info,h2=info,reqwest=info,tower=info,tower_http=info}
    ports:
      - "${ISSUER_MGMT_HOST_PORT:-8080}:8080"
    healthcheck:
      test:
        - CMD
        - curl
        - -fsS
        - http://localhost:8080/healthz
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  # The swiyu-issuer-oidcapi OID4VCI endpoint. Shares the database with
  # swiyu-issuer-mgmtapi (offers, OIDC tokens, nonces, signing-engine
  # keypairs all live in the same Postgres). Independent of
  # swiyu-issuer-mgmtapi at runtime — both are reachable directly during
  # dev; in production a reverse proxy in front of the two presents a
  # single ISSUER_BASE_URL.
  swiyu-issuer-oidcapi:
    image: ghcr.io/gubaer/swiyu-issuer-oidcapi:${IMAGE_TAG:-swiyu-beta}
    container_name: swiyu-issuer-oidcapi
    depends_on:
      postgres:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-swiyu_issuer}:${POSTGRES_PASSWORD:-swiyu_issuer}@postgres:5432/${POSTGRES_DB:-swiyu_issuer}
      BIND_ADDR_OIDC: 0.0.0.0:8081
      ISSUER_BASE_URL: ${ISSUER_BASE_URL:-http://localhost:8080}
      ACCESS_TOKEN_TTL_SECONDS: ${ACCESS_TOKEN_TTL_SECONDS:-300}
      C_NONCE_TTL_SECONDS: ${C_NONCE_TTL_SECONDS:-300}
      SIGNING_ENGINE: ${SIGNING_ENGINE:-vault}
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN_ID:-dev-only-root}
      SECRET_ENCRYPTION_ENGINE: ${SECRET_ENCRYPTION_ENGINE:-dev}
      SECRET_ENCRYPTION_DEV_MASTER_KEY: ${SECRET_ENCRYPTION_DEV_MASTER_KEY:-ZGV2LXNlY3JldC1tYW5hZ2VtZW50LW1hc3Rlci1rZXk=}
      RUST_LOG: ${RUST_LOG:-debug,sqlx=info,hyper=info,h2=info,reqwest=info,tower=info,tower_http=info}
    ports:
      - "${ISSUER_OIDC_HOST_PORT:-8081}:8081"
    healthcheck:
      test:
        - CMD
        - curl
        - -fsS
        - http://localhost:8081/healthz
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  # Ad-hoc CLI access. Not started by `docker compose up`; invoked via
  # `docker compose run --rm swiyu-issuer-cli <subcommand>` (e.g.
  # `tenant api-token mint --tenant <id> --name <name>`). The `tools`
  # profile keeps it out of the default startup set; `docker compose
  # run` still resolves `depends_on` so postgres and vault are up
  # before the CLI connects.
  swiyu-issuer-cli:
    image: ghcr.io/gubaer/swiyu-issuer-cli:${IMAGE_TAG:-swiyu-beta}
    depends_on:
      postgres:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-swiyu_issuer}:${POSTGRES_PASSWORD:-swiyu_issuer}@postgres:5432/${POSTGRES_DB:-swiyu_issuer}
      SECRET_ENCRYPTION_ENGINE: ${SECRET_ENCRYPTION_ENGINE:-dev}
      SECRET_ENCRYPTION_DEV_MASTER_KEY: ${SECRET_ENCRYPTION_DEV_MASTER_KEY:-ZGV2LXNlY3JldC1tYW5hZ2VtZW50LW1hc3Rlci1rZXk=}
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN_ID:-dev-only-root}
      RUST_LOG: ${RUST_LOG:-info,swiyu_issuer=debug}

volumes:
  postgres_data:
