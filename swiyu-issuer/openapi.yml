openapi: 3.1.0

info:
  title: swiyu-issuer Management API
  version: 0.2.0
  description: |
    Management API consumed by a tenant's business application (BA) to
    register issuers, manage their lifecycle, and create credential
    offers. Issuer registration is asynchronous: the BA submits a
    create-issuer task to `POST /api/v1/issuers` and polls
    `GET /api/v1/operation-tasks/{task_id}` until the saga completes.
    Credential offers are later picked up by a wallet over OID4VCI;
    the wallet-facing endpoints live in a separate binary and are not
    described here.

    Authentication: every request must carry
    `Authorization: Bearer tok_<base58>`. Tokens are tenant-scoped
    and minted via the `issuer-mgmt mint-token` CLI; alpha/beta
    deployments ship with a documented dev token for the seeded
    tenant. See `specs/impl_auth.md` for the full design.

    See `specs/impl_api_management.md` for design rationale.
  license:
    name: MIT

servers:
  - url: http://localhost:8080
    description: Local development (docker compose up + cargo run)

paths:
  /healthz:
    get:
      summary: Liveness probe
      description: Always returns 200. No database check; for orchestrator liveness only.
      operationId: healthz
      responses:
        '200':
          description: Service is alive.
          content:
            text/plain:
              schema:
                type: string
                example: ok

  /readyz:
    get:
      summary: Readiness probe
      description: Returns 200 if a database connection can be acquired.
      operationId: readyz
      responses:
        '200':
          description: Service is ready to accept requests.
          content:
            text/plain:
              schema:
                type: string
                example: ok
        '503':
          description: Database is not reachable.

  /api/v1/issuers:
    post:
      summary: Submit a create-issuer task
      description: |
        Queues a `create_issuer` operation task that runs asynchronously.
        The server allocates the `issuer_id` synchronously and pins it
        on the task, so the BA gets both `task_id` and `issuer_id`
        back from this call: poll the saga's progress via
        `GET /api/v1/operation-tasks/{task_id}`, and fetch the
        materialised issuer via `GET /api/v1/issuers/{issuer_id}`
        once the saga completes. The issuer fetch returns 404 for
        the allocated id until the task reaches `completed`.

        Tenant scoping comes from the bearer token; the body never
        carries a `tenant_id`. Both body fields are optional — omit to
        accept server-supplied defaults (`description = ""`,
        `display_name = "Issuer <bare-issuer-id>"`).
      operationId: createIssuer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIssuerSubmission'
      responses:
        '201':
          description: Task accepted; saga running asynchronously.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateIssuerResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
    get:
      summary: List issuers
      description: |
        Lists the tenant's issuers, newest first. Cursor-paginated.
        Pagination sorts by `(created_at DESC, id DESC)`; the cursor
        encodes those two values opaquely (clients must not parse it).
        `next_cursor` is `null` when the last page is reached. The
        seeded legacy dev row from migration 0004 (lacks `state`) is
        filtered out of the listing.
      operationId: listIssuers
      parameters:
        - name: limit
          in: query
          required: false
          description: Page size, 1..=100. Default 25.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: cursor
          in: query
          required: false
          description: |
            Opaque cursor returned as `next_cursor` from the previous
            page. Omit to fetch the first page. Clients must not parse
            or construct cursors; the server rejects anything it did
            not emit.
          schema:
            type: string
      responses:
        '200':
          description: Page of issuers.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListIssuersResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/issuers/{issuer_id}:
    get:
      summary: Fetch an issuer
      description: |
        Returns the BA-facing projection of an issuer. While the task
        submitted via `POST /api/v1/issuers` is still running, this
        endpoint returns 404 for the not-yet-materialised id —
        standard "not ready yet" semantics for a
        known-but-not-yet-materialised resource.

        Temporary while early dev: the seeded legacy dev row from
        migration 0004 also returns 404: it pre-dates the
        issuer-management surface and is not part of the current
        contract.
      operationId: getIssuer
      parameters:
        - $ref: '#/components/parameters/IssuerId'
      responses:
        '200':
          description: Issuer found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetIssuerResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/issuers/{issuer_id}/deactivate:
    post:
      summary: Submit a deactivate-issuer task
      description: |
        Queues a `deactivate_issuer` operation task that runs
        asynchronously. The saga signs and publishes a deactivation
        DIDLog entry to the SWIYU Identifier Registry, flips the
        local issuer row to `deactivated`, and bulk-cancels every
        still-pending credential offer for that issuer (already-
        issued, already-cancelled, and already-expired offers are
        left alone).

        **Idempotent on resubmit.** Three response shapes:

        - The issuer is `active` and no `deactivate_issuer` task is
          in flight: `201 Created`, body carries the new `task_id`.
        - The issuer is `active` and a `deactivate_issuer` task for
          it is already `pending` or `in_progress`: `200 OK`, body
          carries the *existing* `task_id`. A duplicate submission
          is treated as a poll-handle request, not an error.
        - The issuer is already `deactivated`: `200 OK`, body
          carries the completed task's `task_id` if findable, or
          `task_id: null` for issuers deactivated by a path that
          left no task row (e.g. seeded fixtures).

        The body is empty by convention. Clients may send no body
        at all, an empty body, or `{}`; all three are accepted.
        Tenant scoping comes from the bearer token.
      operationId: deactivateIssuer
      parameters:
        - $ref: '#/components/parameters/IssuerId'
      responses:
        '200':
          description: |
            Idempotent re-submission. Either a `deactivate_issuer`
            task is already in flight, or the issuer is already
            `deactivated`. `task_id` is the existing task's id (or
            `null` for already-deactivated issuers without a
            traceable task row).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeactivateIssuerResponse'
        '201':
          description: Task accepted; saga running asynchronously.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeactivateIssuerResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/issuers/{issuer_id}/rotate-keys:
    post:
      summary: Submit a rotate-keys task
      description: |
        Queues a `rotate_keys` operation task that runs
        asynchronously. The saga generates fresh key pairs for the
        rotated roles via the SigningEngine, builds a DIDLog
        rotation entry whose `updateKeys` advertises the new
        `Authorized` key and whose embedded DID document carries
        the new `Authentication` and `Assertion` verification
        methods, signs the entry with the **outgoing** `Authorized`
        private key (even when `Authorized` is itself rotated),
        publishes the entry to the SWIYU Identifier Registry, and
        atomically swaps the issuer row's three key columns.
        Non-rotated roles keep their existing key pair on the
        local row; their public keys still appear in the new
        DIDLog entry.

        **Repeatable.** Unlike `deactivate`, rotation has no
        terminal "already done" semantics — a fresh submission
        after a previous rotation completed lands a new task.

        **Idempotent on resubmit while in flight.** Response
        shapes:

        - The issuer is `active` and no `rotate_keys` task is in
          flight: `201 Created`, body carries the new `task_id`.
        - The issuer is `active` and a `rotate_keys` task for it
          is already `pending` or `in_progress`: `200 OK`, body
          carries the *existing* `task_id`. A duplicate submission
          is treated as a poll-handle request.
        - The issuer is already `deactivated`: `409 Conflict`.
          Rotation makes no sense on a deactivated issuer; the
          request is rejected rather than treated as already-
          rotated.

        Tenant scoping comes from the bearer token.
      operationId: rotateKeys
      parameters:
        - $ref: '#/components/parameters/IssuerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RotateKeysSubmission'
      responses:
        '200':
          description: |
            Idempotent re-submission of an already-in-flight
            rotation. `task_id` is the existing task's id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RotateKeysResponse'
        '201':
          description: Task accepted; saga running asynchronously.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RotateKeysResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/operation-tasks/{task_id}:
    get:
      summary: Poll an operation task
      description: |
        Returns the current status of a long-running operation task.
        Use `state` to detect terminal outcomes (`completed`,
        `failed`) and `step` to surface saga progress in operator
        UIs. `attempts` and `next_attempt_at` are non-`null` while a
        retry is scheduled. On `failed`, `error_code` and
        `error_message` describe the terminal failure.

        The BA already received `task_id` from
        `POST /api/v1/issuers`; this endpoint deliberately omits
        `input` (the BA submitted it), `state_data` (internal saga
        progress), and `result_issuer_id` (already returned by
        `POST /api/v1/issuers`).
      operationId: getOperationTask
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: Task state retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetOperationTaskResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/issuers/{issuer_id}/credential-offers:
    post:
      summary: Create a credential offer
      description: |
        Creates a credential offer for the named issuer. The response carries
        the bare pre-authorised code exactly once; only its hash is persisted.
      operationId: createCredentialOffer
      parameters:
        - $ref: '#/components/parameters/IssuerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCredentialOfferRequest'
      responses:
        '201':
          description: Offer created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCredentialOfferResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    get:
      summary: List credential offers
      description: |
        Lists offers belonging to the issuer, newest first. Cursor-paginated.
        Pagination sorts by `(created_at DESC, id DESC)`; the cursor encodes
        those two values opaquely (clients must not parse it). State filtering
        applies to the *observed* projection, so a row stored as `pending`
        past its `expires_at` is returned by `state=expired`, not
        `state=pending`. `next_cursor` is `null` when the last page is
        reached.
      operationId: listCredentialOffers
      parameters:
        - $ref: '#/components/parameters/IssuerId'
        - name: limit
          in: query
          required: false
          description: Page size, 1..=100. Default 25.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: cursor
          in: query
          required: false
          description: |
            Opaque cursor returned as `next_cursor` from the previous page.
            Omit to fetch the first page. Clients must not parse or
            construct cursors; the server rejects anything it did not emit.
          schema:
            type: string
        - name: state
          in: query
          required: false
          description: |
            Optional filter on the *observed* state. `expired` matches rows
            stored as `pending` whose `expires_at` has passed.
          schema:
            type: string
            enum: [pending, issued, cancelled, expired]
      responses:
        '200':
          description: Page of offers.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListCredentialOffersResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/issuers/{issuer_id}/credential-offers/{offer_id}:
    get:
      summary: Fetch a credential offer
      description: |
        Returns the current state of the named offer. The `state` field is
        the *observed* state: an offer still stored as `pending` past its
        `expires_at` is reported as `expired`.
      operationId: getCredentialOffer
      parameters:
        - $ref: '#/components/parameters/IssuerId'
        - $ref: '#/components/parameters/OfferId'
      responses:
        '200':
          description: Offer found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCredentialOfferResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/issuers/{issuer_id}/credential-offers/{offer_id}/cancel:
    post:
      summary: Cancel a credential offer
      description: |
        Marks the offer `cancelled` and stamps `cancelled_at`. Returns the
        full offer body in the same shape as `getCredentialOffer`.

        Idempotent: re-cancelling a cancelled offer succeeds with 200 and
        the existing `cancelled_at` value (no overwrite). Cancelling a
        stored-`pending` offer whose `expires_at` has passed is allowed and
        reported back as `cancelled` — the expiry-on-read rule governs how
        `state` is reported, not which transitions are legal.

        No request body.
      operationId: cancelCredentialOffer
      parameters:
        - $ref: '#/components/parameters/IssuerId'
        - $ref: '#/components/parameters/OfferId'
      responses:
        '200':
          description: Offer is `cancelled` (newly transitioned or already so).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCredentialOfferResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/issuers/{issuer_id}/credential-offers/{offer_id}/status:
    get:
      summary: Fetch credential offer status
      description: |
        Lightweight status check for polling business applications. Returns
        only the lifecycle fields — no claims, no PII, no `vct`, no
        `created_at`. The `state` field follows the same observed-state
        rule as `getCredentialOffer`.
      operationId: getCredentialOfferStatus
      parameters:
        - $ref: '#/components/parameters/IssuerId'
        - $ref: '#/components/parameters/OfferId'
      responses:
        '200':
          description: Status retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OfferStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/issuers/{issuer_id}/credentials:
    get:
      summary: List the issuer's issued credentials
      description: |
        Lists credentials belonging to the named issuer, newest first.
        Cursor-paginated. Pagination sorts by `(issued_at DESC, id DESC)`;
        the cursor encodes those two values opaquely (clients must not
        parse it). `next_cursor` is `null` when the last page is
        reached.

        Filters apply on stored values. The `expired` view label in
        the response derives from `expires_at` at read time and is
        deliberately *not* a filter — it would force a server-side
        projection over `now()` and would not align with any persisted
        column.

        Tenant scoping comes from the bearer token; an `issuer_id`
        path segment naming an issuer the tenant does not own returns
        `404 Not Found`.
      operationId: listIssuedCredentials
      parameters:
        - $ref: '#/components/parameters/IssuerId'
        - name: limit
          in: query
          required: false
          description: Page size, 1..=100. Default 25.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: cursor
          in: query
          required: false
          description: |
            Opaque cursor returned as `next_cursor` from the previous
            page. Omit to fetch the first page. Clients must not parse
            or construct cursors; the server rejects anything it did
            not emit.
          schema:
            type: string
        - name: state
          in: query
          required: false
          description: |
            Filter on the stored lifecycle state. `expired` is a
            derived view, not a stored value, so it is rejected with
            `invalid_input`.
          schema:
            type: string
            enum: [active, suspended, revoked]
        - name: vct
          in: query
          required: false
          description: |
            Filter on the SD-JWT VC type identifier. Exact match.
          schema:
            type: string
      responses:
        '200':
          description: Page of issued credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListIssuedCredentialsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/issuers/{issuer_id}/credentials/{credential_id}:
    get:
      summary: Fetch an issued credential
      description: |
        Returns the full record for a single issued credential. The
        `state` field carries the stored lifecycle state; the
        `expired` field is a derived view computed at read time from
        `expires_at`.

        Tenant scoping comes from the bearer token. Cross-tenant
        access (wrong tenant) and cross-issuer access (right tenant,
        wrong issuer in the URL) both return `404 Not Found`,
        indistinguishable from "no such credential" so an attacker
        cannot probe for the existence of resources outside their
        tenant or unrelated issuers.
      operationId: getIssuedCredential
      parameters:
        - $ref: '#/components/parameters/IssuerId'
        - $ref: '#/components/parameters/CredentialId'
      responses:
        '200':
          description: Credential found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetIssuedCredentialResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/issuers/{issuer_id}/credentials/{credential_id}/suspend:
    post:
      summary: Suspend an issued credential
      description: |
        Marks an active issued credential `suspended`. Synchronous;
        returns the updated record.

        **Reversible.** A suspended credential can be unsuspended via
        `unsuspendIssuedCredential`. Suspending an already-suspended
        credential returns `409 Conflict`; suspending a revoked credential
        also returns `409 Conflict` (the lifecycle is `Active <-> Suspended`,
        with `Revoked` terminal).

        Tenant scoping comes from the bearer token. Cross-tenant and
        cross-issuer access both return `404 Not Found`. No request
        body.
      operationId: suspendIssuedCredential
      parameters:
        - $ref: '#/components/parameters/IssuerId'
        - $ref: '#/components/parameters/CredentialId'
      responses:
        '200':
          description: Credential is now `suspended`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetIssuedCredentialResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/issuers/{issuer_id}/credentials/{credential_id}/unsuspend:
    post:
      summary: Unsuspend an issued credential
      description: |
        Restores a suspended issued credential to `active`.
        Synchronous; returns the updated record.

        Unsuspending an already-active credential returns `409 Conflict`;
        unsuspending a revoked credential also returns `409 Conflict`
        (revocation is terminal).

        Tenant scoping matches `suspendIssuedCredential`. No request body.
      operationId: unsuspendIssuedCredential
      parameters:
        - $ref: '#/components/parameters/IssuerId'
        - $ref: '#/components/parameters/CredentialId'
      responses:
        '200':
          description: Credential is now `active`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetIssuedCredentialResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/issuers/{issuer_id}/credentials/{credential_id}/revoke:
    post:
      summary: Revoke an issued credential
      description: |
        Marks an issued credential `revoked`. Synchronous; returns the
        updated record.

        **Terminal.** Revocation is one-way; revoking an already-revoked
        credential returns `409 Conflict`. Revoking a suspended
        credential is allowed and produces `revoked`.

        Tenant scoping matches `suspendIssuedCredential`. No request body.
      operationId: revokeIssuedCredential
      parameters:
        - $ref: '#/components/parameters/IssuerId'
        - $ref: '#/components/parameters/CredentialId'
      responses:
        '200':
          description: Credential is now `revoked`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetIssuedCredentialResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

components:
  parameters:
    IssuerId:
      name: issuer_id
      in: path
      required: true
      description: Bare base58 issuer identifier (no `issuer_` prefix).
      schema:
        type: string
        pattern: '^[1-9A-HJ-NP-Za-km-z]{1,32}$'
        example: 9hXq2vRtL8pK7f

    OfferId:
      name: offer_id
      in: path
      required: true
      description: Bare base58 credential offer identifier (no `offer_` prefix).
      schema:
        type: string
        pattern: '^[1-9A-HJ-NP-Za-km-z]{1,32}$'
        example: 9hXq2vRtL8pK7f

    TaskId:
      name: task_id
      in: path
      required: true
      description: Bare base58 operation-task identifier (no `task_` prefix).
      schema:
        type: string
        pattern: '^[1-9A-HJ-NP-Za-km-z]{1,32}$'
        example: 9hXq2vRtL8pK7f

    CredentialId:
      name: credential_id
      in: path
      required: true
      description: Bare base58 issued-credential identifier (no `credential_` prefix).
      schema:
        type: string
        pattern: '^[1-9A-HJ-NP-Za-km-z]{1,32}$'
        example: 9hXq2vRtL8pK7f

  responses:
    BadRequest:
      description: |
        Invalid input. Possible `error` codes: `invalid_input`,
        `unknown_vct`, `claims_validation_failed`.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'

    NotFound:
      description: |
        Resource not found, or not owned by the authenticated tenant.
        Wrong-tenant returns the same status as no-such-resource so an
        attacker cannot probe for existence outside their tenant.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'

    Conflict:
      description: State transition not allowed, or a unique constraint was violated.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'

  schemas:
    CreateIssuerSubmission:
      type: object
      additionalProperties: false
      properties:
        description:
          type: string
          maxLength: 255
          description: |
            Free-text BA description. Trimmed; empty after trim is
            treated as omitted. Defaults to `""` if missing.
        display_name:
          type: string
          maxLength: 255
          description: |
            BA-facing display name. Trimmed; empty after trim is
            treated as omitted. Defaults to `Issuer <bare-issuer-id>`
            using the freshly generated `issuer_id` if missing.

    CreateIssuerResponse:
      type: object
      required: [task_id, issuer_id]
      properties:
        task_id:
          type: string
          description: |
            Prefixed task identifier. Poll saga progress via
            `GET /api/v1/operation-tasks/{task_id}`.
          example: task_9hXq2vRtL8pK7f
        issuer_id:
          type: string
          description: |
            Prefixed issuer identifier allocated server-side at submit
            time. The materialised issuer is available via
            `GET /api/v1/issuers/{issuer_id}` once the saga completes.
          example: issuer_9hXq2vRtL8pK7f

    DeactivateIssuerResponse:
      type: object
      required: [task_id, issuer_id]
      properties:
        task_id:
          type: [string, "null"]
          description: |
            Prefixed task identifier. `null` only when the issuer is
            already `deactivated` and no `deactivate_issuer` task
            row exists (e.g. seeded fixture). Otherwise carries
            either the freshly inserted task (HTTP 201) or the
            existing in-flight or completed task (HTTP 200).
          example: task_9hXq2vRtL8pK7f
        issuer_id:
          type: string
          description: |
            Echo of the `issuer_id` path parameter, prefixed.
          example: issuer_9hXq2vRtL8pK7f

    RotateKeysSubmission:
      type: object
      additionalProperties: false
      required: [roles]
      properties:
        roles:
          type: array
          minItems: 1
          items:
            type: string
            enum: [authorized, authentication, assertion, all]
          description: |
            Non-empty subset of `{authorized, authentication,
            assertion}` to rotate, plus the sentinel `"all"` as
            shorthand for the full three-role set. `"all"` may
            appear *only* when alone; mixing it with concrete role
            names is rejected with `invalid_input` (server-side a
            client bug). Duplicates are tolerated and de-duplicated.
            Server-side, `["all"]` expands to the explicit
            three-role set before the saga starts; the persisted
            task input never carries the sentinel.
          example: ["authorized"]

    RotateKeysResponse:
      type: object
      required: [task_id, issuer_id]
      properties:
        task_id:
          type: string
          description: |
            Prefixed task identifier. Always present — every
            rotate-keys submission produces a task. Carries either
            the freshly inserted task (HTTP 201) or the existing
            in-flight task (HTTP 200, poll-handle case).
          example: task_9hXq2vRtL8pK7f
        issuer_id:
          type: string
          description: |
            Echo of the `issuer_id` path parameter, prefixed.
          example: issuer_9hXq2vRtL8pK7f

    GetIssuerResponse:
      type: object
      required: [id, did, state, description, display_name]
      properties:
        id:
          type: string
          example: issuer_9hXq2vRtL8pK7f
        did:
          type: string
          description: Decentralised identifier of the issuer.
          example: 'did:tdw:9hXq2vRtL8pK7f:registry.example.org'
        state:
          type: string
          enum: [active, deactivated]
          description: |
            Lifecycle state. New issuers start `active`; the transition
            to `deactivated` is one-way.
        description:
          type: string
        display_name:
          type: string

    ListIssuersResponse:
      type: object
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/GetIssuerResponse'
        next_cursor:
          type: [string, "null"]
          description: |
            Opaque cursor for the next page, or `null` if the last
            page has been reached. Pass back as the `cursor` query
            parameter on the next request.

    GetOperationTaskResponse:
      type: object
      required:
        - id
        - task_type
        - state
        - step
        - attempts
        - next_attempt_at
        - error_code
        - error_message
        - created_at
        - updated_at
        - completed_at
      properties:
        id:
          type: string
          example: task_9hXq2vRtL8pK7f
        task_type:
          type: string
          enum: [create_issuer, deactivate_issuer, rotate_keys]
          description: |
            The kind of operation.
        state:
          type: string
          enum: [pending, in_progress, completed, failed]
          description: |
            Lifecycle state. `pending` and `in_progress` are
            transient (the BA does not distinguish active execution
            from time spent waiting on a retry timer); `completed`
            and `failed` are terminal.
        step:
          type: [string, "null"]
          description: |
            Name of the current saga step. `null` while the task has
            not yet started its first step (state `pending` before
            the worker picks it up). The set of step names per task
            type is an internal-implementation detail — opaque to the
            BA's contract, useful only for diagnostic display.
            Programmatic decisions belong on `state`.
        attempts:
          type: integer
          minimum: 0
          description: Number of executed attempts on the current step.
        next_attempt_at:
          type: [string, "null"]
          format: date-time
          description: |
            When the current step is scheduled to retry next. `null`
            unless a retry is pending.
        error_code:
          type: [string, "null"]
          description: |
            Stable, machine-readable error code. Set when `state` is
            `failed`; `null` otherwise.
        error_message:
          type: [string, "null"]
          description: |
            Human-readable error description. Set when `state` is
            `failed`; `null` otherwise.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        completed_at:
          type: [string, "null"]
          format: date-time
          description: |
            When the task reached a terminal state (`completed` or
            `failed`). `null` while still running.

    CreateCredentialOfferRequest:
      type: object
      required: [vct, claims]
      properties:
        vct:
          type: string
          description: |
            SD-JWT VC type identifier (URI). Determines which JSON
            Schema validates `claims`. Unknown values return 400.
          example: urn:communal:local-residence-id
        claims:
          type: object
          description: |
            Credential claims as a JSON object. Validated against the
            schema bundled for `vct` before the offer is persisted.
          additionalProperties: true
        expires_in_seconds:
          type: integer
          minimum: 60
          maximum: 3600
          default: 600
          description: Lifetime of the offer in seconds. Default 10 minutes.

    CreateCredentialOfferResponse:
      type: object
      required: [id, pre_auth_code, offer_deeplink, expires_at]
      properties:
        id:
          type: string
          description: Prefixed credential offer identifier.
          example: offer_9hXq2vRtL8pK7f
        pre_auth_code:
          type: string
          description: |
            Bare OID4VCI pre-authorised code. Returned exactly once at
            creation; only its hash is persisted. Use it in the wallet's
            redemption flow.
        offer_deeplink:
          type: string
          format: uri
          description: |
            `openid-credential-offer://` URI suitable for rendering as a
            QR code or handing to the holder's wallet.
          example: openid-credential-offer://?credential_offer_uri=https%3A%2F%2Fissuer.example.com%2Fi%2F4Mk7yK5pQR7sN3%2Fcredential-offer%2F9hXq2vRtL8pK7f
        expires_at:
          type: string
          format: date-time

    GetCredentialOfferResponse:
      type: object
      required:
        - id
        - issuer_id
        - vct
        - claims
        - state
        - expires_at
        - created_at
        - issued_at
        - cancelled_at
      properties:
        id:
          type: string
          example: offer_9hXq2vRtL8pK7f
        issuer_id:
          type: string
          example: issuer_9hXq2vRtL8pK7f
        vct:
          type: string
          example: urn:communal:local-residence-id
        claims:
          type: object
          additionalProperties: true
        state:
          type: string
          enum: [pending, issued, cancelled, expired]
          description: |
            Observed state. May report `expired` even when the database
            row is still `pending` (v0.1.0 evaluates expiry on read).
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        issued_at:
          type: [string, "null"]
          format: date-time
          description: |
            Timestamp at which the offer transitioned to `issued`.
            `null` until the wallet has redeemed the offer. Always
            present so consumers can rely on the field's existence.
        cancelled_at:
          type: [string, "null"]
          format: date-time
          description: |
            Timestamp at which the offer transitioned to `cancelled`.
            `null` until cancelled. Always present so consumers can
            rely on the field's existence.

    OfferStatusResponse:
      type: object
      required:
        - id
        - state
        - expires_at
        - issued_at
        - cancelled_at
      properties:
        id:
          type: string
          example: offer_9hXq2vRtL8pK7f
        state:
          type: string
          enum: [pending, issued, cancelled, expired]
          description: |
            Observed state. May report `expired` even when the database
            row is still `pending` (v0.1.0 evaluates expiry on read).
        expires_at:
          type: string
          format: date-time
        issued_at:
          type: [string, "null"]
          format: date-time
          description: |
            Timestamp at which the offer transitioned to `issued`.
            `null` until the wallet has redeemed the offer.
        cancelled_at:
          type: [string, "null"]
          format: date-time
          description: |
            Timestamp at which the offer transitioned to `cancelled`.
            `null` until cancelled.

    ListCredentialOffersResponse:
      type: object
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/GetCredentialOfferResponse'
        next_cursor:
          type: [string, "null"]
          description: |
            Opaque cursor for the next page, or `null` if the last page
            has been reached. Pass back as the `cursor` query parameter
            on the next request.

    GetIssuedCredentialResponse:
      type: object
      required:
        - id
        - issuer_id
        - credential_offer_id
        - vct
        - holder_key_jkt
        - status_list_id
        - status_list_index
        - state
        - expired
        - issued_at
        - expires_at
      properties:
        id:
          type: string
          example: credential_9hXq2vRtL8pK7f
        issuer_id:
          type: string
          example: issuer_9hXq2vRtL8pK7f
        credential_offer_id:
          type: string
          description: Identifier of the offer this credential was issued from.
          example: offer_9hXq2vRtL8pK7f
        vct:
          type: string
          description: SD-JWT VC type identifier (URI), copied from the offer at issuance.
          example: urn:communal:local-residence-id
        holder_key_jkt:
          type: string
          description: |
            RFC 7638 thumbprint of the wallet's `cnf` key, base64url-encoded.
            The full `cnf` key is not retained; the thumbprint is enough to
            correlate later presentations or audit-trail entries with the
            credential the wallet was issued.
        status_list_id:
          type: string
          description: |
            Identifier of the BitstringStatusList instance whose two-bit
            slot encodes this credential's revocation/suspension state.
            Together with `status_list_index` this is the same `(uri, idx)`
            pair the credential's signed `status` claim references.
          example: status_list_9hXq2vRtL8pK7f
        status_list_index:
          type: integer
          minimum: 0
          maximum: 131071
          description: |
            Position of this credential's two-bit slot within the
            `status_list_id` bitstring. Allocated at issuance and never
            reused for the row's lifetime.
        state:
          type: string
          enum: [active, suspended, revoked]
          description: |
            Lifecycle state stored on the row. `active` and `suspended`
            are mutually reachable; `revoked` is terminal. `expired` is
            **not** a state — see the `expired` field below.
        expired:
          type: boolean
          description: |
            Derived view over `expires_at`. `true` iff the server's
            current clock has passed `expires_at`. Verifiers enforce
            expiry against the credential's signed `exp` claim, not
            this column; this field is a convenience for management
            UIs (per `aspect-credential-management.md` § "Expiry is a
            view, not a state").
        issued_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time

    ListIssuedCredentialsResponse:
      type: object
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/GetIssuedCredentialResponse'
        next_cursor:
          type: [string, "null"]
          description: |
            Opaque cursor for the next page, or `null` if the last
            page has been reached. Pass back as the `cursor` query
            parameter on the next request.

    ErrorBody:
      type: object
      required: [error, details]
      properties:
        error:
          type: string
          description: Stable machine-readable error code.
          enum:
            - not_found
            - unauthorised
            - forbidden
            - unknown_vct
            - claims_validation_failed
            - invalid_input
            - conflict
            - not_implemented
            - internal_error
        details:
          type: string
          description: |
            Human-readable explanation. For `claims_validation_failed`
            this contains a `; `-joined list of JSON-Schema validator
            messages.
