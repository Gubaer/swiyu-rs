# Local PostgreSQL, HashiCorp Vault, issuer-mgmt, and issuer-oidc for
# swiyu-issuer development.
#
# Usage (run from this directory, swiyu-issuer/):
#   docker compose up -d            # builds + starts everything
#
# Or from the workspace root:
#   docker compose -f swiyu-issuer/docker-compose.yml up -d
#
# `docker compose build <service>` rebuilds a single binary image.
# `docker compose up -d --build <service>` rebuilds and restarts it.
# Each service builds its own runtime stage from the same Dockerfile
# (`runtime-mgmt`, `runtime-oidc`); the cargo-chef cook layer is
# shared between the two so the second build is incremental.
#
# Compose auto-loads .env from this directory. The defaults below
# (after the :- in each ${VAR:-default}) match those documented in
# .env.example, so `docker compose up -d` works without a .env file.
# A developer's .env overrides them; if you change a credential
# there you must keep DATABASE_URL in .env consistent with the
# four POSTGRES_* values, since the binary reads the URL directly.
#
# The Postgres host port defaults to 5433 (not the default 5432) so
# a Postgres install already running on the host does not clash
# with this dev container. Vault uses 8200 (its standard port).
#
# Vault runs in dev mode: in-memory storage, already unsealed, a
# single fixed root token. State is wiped on every container
# restart. This is for local development and integration tests
# only — production must use a real Vault deployment with sealed
# storage and proper auth (see specs/impl-key-management.md,
# VaultSigningEngine subsection). The vault-init service enables
# the Transit secrets engine once Vault is healthy so callers can
# create keys and sign immediately.
#
# Migrations are NOT applied by this compose file. The swiyu-issuer
# binary runs them at startup via persistence::run_migrations, so
# the same code path applies in dev and in production.
#
# To wipe the database (drops the volume) and reset Vault state:
#   docker compose down -v

name: swiyu-issuer

services:
  postgres:
    image: postgres:17
    container_name: swiyu-issuer-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-swiyu_issuer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-swiyu_issuer}
      POSTGRES_DB: ${POSTGRES_DB:-swiyu_issuer}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-swiyu_issuer} -d ${POSTGRES_DB:-swiyu_issuer}
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  vault:
    image: hashicorp/vault:1.18
    container_name: swiyu-issuer-vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID:-dev-only-root}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
    ports:
      - "${VAULT_HOST_PORT:-8200}:8200"
    healthcheck:
      test:
        - CMD
        - vault
        - status
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  vault-init:
    image: hashicorp/vault:1.18
    container_name: swiyu-issuer-vault-init
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN_ID:-dev-only-root}
    entrypoint:
      - /bin/sh
      - -c
      - vault secrets enable transit || true
    restart: "no"

  # One-shot dev seed: writes the OAuth2 columns of the seeded dev
  # tenant from .env. Two steps — credentials first, then the
  # refresh token — because a refresh-token grant fails until
  # client_id/client_secret are populated.
  #   1. ${SWIYU_CLIENT_ID} + ${SWIYU_CLIENT_SECRET} → oauth_client_id +
  #      oauth_client_secret (atomic, both columns or neither).
  #   2. ${SWIYU_REFRESH_TOKEN} → oauth_refresh_token.
  # Both steps idempotent via `--only-if-empty`: the credentials seed
  # skips when both columns are non-NULL; the refresh-token seed skips
  # when the column is non-NULL (e.g. because the runtime rotated it).
  # Empty env vars silently skip the corresponding step; the first
  # worker call then fails with MissingCredentials, same as without
  # this service. issuer-mgmt's start is gated on
  # service_completed_successfully so the seed lands before any
  # OAuth2 grant is attempted.
  bootstrap-dev-tenant:
    build:
      context: ..
      dockerfile: swiyu-issuer/Dockerfile
      target: runtime-cli
    container_name: swiyu-issuer-bootstrap-dev-tenant
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-swiyu_issuer}:${POSTGRES_PASSWORD:-swiyu_issuer}@postgres:5432/${POSTGRES_DB:-swiyu_issuer}
      DEV_TENANT_ID: ${DEV_TENANT_ID:-4Mk7yK5pQR7sN3}
      SWIYU_CLIENT_ID: ${SWIYU_CLIENT_ID}
      SWIYU_CLIENT_SECRET: ${SWIYU_CLIENT_SECRET}
      SWIYU_REFRESH_TOKEN: ${SWIYU_REFRESH_TOKEN}
      RUST_LOG: ${RUST_LOG:-info,swiyu_issuer=debug}
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ -n "$$SWIYU_CLIENT_ID" ] && [ -n "$$SWIYU_CLIENT_SECRET" ]; then
          printf '%s' "$$SWIYU_CLIENT_SECRET" \
            | swiyu-issuer-cli tenant set-oauth-credentials \
                --tenant "$$DEV_TENANT_ID" \
                --client-id "$$SWIYU_CLIENT_ID" \
                --client-secret-stdin --only-if-empty
        else
          echo "bootstrap-dev-tenant: SWIYU_CLIENT_ID and/or SWIYU_CLIENT_SECRET empty, skipping credentials seed" >&2
        fi
        if [ -n "$$SWIYU_REFRESH_TOKEN" ]; then
          printf '%s' "$$SWIYU_REFRESH_TOKEN" \
            | swiyu-issuer-cli tenant import-oauth-refresh-token \
                --tenant "$$DEV_TENANT_ID" --token-stdin --only-if-empty
        else
          echo "bootstrap-dev-tenant: SWIYU_REFRESH_TOKEN is empty, skipping refresh-token seed" >&2
        fi
    restart: "no"

  # The issuer-mgmt management API. SWIYU_IDENTIFIER_REGISTRY_URL,
  # SWIYU_STATUS_REGISTRY_URL, and SWIYU_TOKEN_URL come from .env; the
  # in-container hostnames for Postgres and Vault are forced here
  # because the host-side values in .env (localhost:5433,
  # localhost:8200) do not resolve inside the compose network.
  issuer-mgmt:
    build:
      context: ..
      dockerfile: swiyu-issuer/Dockerfile
      target: runtime-mgmt
    container_name: swiyu-issuer-mgmt
    depends_on:
      postgres:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
      bootstrap-dev-tenant:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-swiyu_issuer}:${POSTGRES_PASSWORD:-swiyu_issuer}@postgres:5432/${POSTGRES_DB:-swiyu_issuer}
      BIND_ADDR: 0.0.0.0:8080
      ISSUER_BASE_URL: ${ISSUER_BASE_URL:-http://localhost:8080}
      SIGNING_ENGINE: ${SIGNING_ENGINE:-vault}
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN_ID:-dev-only-root}
      # `dev` is the only supported value today; `vault` is not yet implemented.
      # The well-known master key below encodes the 32-byte ASCII string
      # `dev-secret-management-master-key` and must never escape dev.
      SECRET_ENCRYPTION_ENGINE: ${SECRET_ENCRYPTION_ENGINE:-dev}
      SECRET_ENCRYPTION_DEV_MASTER_KEY: ${SECRET_ENCRYPTION_DEV_MASTER_KEY:-ZGV2LXNlY3JldC1tYW5hZ2VtZW50LW1hc3Rlci1rZXk=}
      SWIYU_IDENTIFIER_REGISTRY_URL: ${SWIYU_IDENTIFIER_REGISTRY_URL}
      SWIYU_STATUS_REGISTRY_URL: ${SWIYU_STATUS_REGISTRY_URL}
      SWIYU_TOKEN_URL: ${SWIYU_TOKEN_URL}
      # Smoke-test friendly default: debug for our crates, info for
      # known-noisy deps (sqlx prints every prepared statement at debug;
      # hyper/h2/reqwest/tower flood with per-byte trace lines).
      # Override via `.env` if you want something different.
      RUST_LOG: ${RUST_LOG:-debug,sqlx=info,hyper=info,h2=info,reqwest=info,tower=info,tower_http=info}
    ports:
      - "${ISSUER_MGMT_HOST_PORT:-8080}:8080"
    healthcheck:
      test:
        - CMD
        - curl
        - -fsS
        - http://localhost:8080/healthz
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  # The issuer-oidc OID4VCI endpoint. Shares the database with
  # issuer-mgmt (offers, OIDC tokens, nonces, signing-engine keypairs
  # all live in the same Postgres). Independent of issuer-mgmt at
  # runtime — both are reachable directly during dev; in production a
  # reverse proxy in front of the two presents a single ISSUER_BASE_URL.
  issuer-oidc:
    build:
      context: ..
      dockerfile: swiyu-issuer/Dockerfile
      target: runtime-oidc
    container_name: swiyu-issuer-oidc
    depends_on:
      postgres:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-swiyu_issuer}:${POSTGRES_PASSWORD:-swiyu_issuer}@postgres:5432/${POSTGRES_DB:-swiyu_issuer}
      BIND_ADDR_OIDC: 0.0.0.0:8081
      ISSUER_BASE_URL: ${ISSUER_BASE_URL:-http://localhost:8080}
      ACCESS_TOKEN_TTL_SECONDS: ${ACCESS_TOKEN_TTL_SECONDS:-300}
      C_NONCE_TTL_SECONDS: ${C_NONCE_TTL_SECONDS:-300}
      SIGNING_ENGINE: ${SIGNING_ENGINE:-vault}
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN_ID:-dev-only-root}
      SECRET_ENCRYPTION_ENGINE: ${SECRET_ENCRYPTION_ENGINE:-dev}
      SECRET_ENCRYPTION_DEV_MASTER_KEY: ${SECRET_ENCRYPTION_DEV_MASTER_KEY:-ZGV2LXNlY3JldC1tYW5hZ2VtZW50LW1hc3Rlci1rZXk=}
      RUST_LOG: ${RUST_LOG:-debug,sqlx=info,hyper=info,h2=info,reqwest=info,tower=info,tower_http=info}
    ports:
      - "${ISSUER_OIDC_HOST_PORT:-8081}:8081"
    healthcheck:
      test:
        - CMD
        - curl
        - -fsS
        - http://localhost:8081/healthz
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

volumes:
  postgres_data:
