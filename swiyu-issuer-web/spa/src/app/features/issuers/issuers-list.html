<section class="issuers-page">
  <header class="page-header">
    <h1>Issuers</h1>
  </header>

  @if (error(); as msg) {
    <p-message severity="error" [text]="msg" />
  } @else {
    <p-table
      [value]="issuers()"
      [loading]="loading()"
      dataKey="id"
      [paginator]="false"
      styleClass="p-datatable-sm"
    >
      <ng-template #header>
        <tr>
          <th>Display name</th>
          <th>State</th>
          <th>DID</th>
          <th>Description</th>
        </tr>
      </ng-template>
      <ng-template #body let-issuer>
        <tr>
          <td>{{ issuer.display_name }}</td>
          <td>
            <p-tag
              [value]="issuer.state"
              [severity]="issuer.state === 'active' ? 'success' : 'secondary'"
            />
          </td>
          <td><code class="did">{{ issuer.did }}</code></td>
          <td>{{ issuer.description }}</td>
        </tr>
      </ng-template>
      <ng-template #emptymessage>
        <tr>
          <td colspan="4" class="empty">No issuers yet for this tenant.</td>
        </tr>
      </ng-template>
    </p-table>
  }
</section>
