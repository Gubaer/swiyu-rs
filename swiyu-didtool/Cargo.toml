[package]
name = "swiyu-didtool"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "didtool"
path = "src/main.rs"

[dependencies]
swiyu-core = { path = "../swiyu-core" }
blake3 = "1"
clap = { version = "4", features = ["derive", "env"] }
dirs = "6"
ed25519-dalek = { version = "2", features = ["rand_core", "pkcs8"] }
p256 = { version = "0.13", features = ["ecdsa", "pkcs8"] }
pkcs8 = { version = "0.10", features = ["pem"] }
rand = "0.8"
thiserror = "2"

[dev-dependencies]
tempfile = "3"
