[package]
name = "swiyu-didtool"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "didtool"
path = "src/main.rs"

[dependencies]
swiyu-core = { path = "../swiyu-core" }
ed25519-dalek = { version = "2", features = ["rand_core", "pkcs8"] }
p256 = { version = "0.13", features = ["ecdsa", "pkcs8"] }
rand = "0.8"
